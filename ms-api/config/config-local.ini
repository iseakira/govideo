[api]
log_file = logs/ms-api.log
web_api_host = localhost
web_api_port = 8080
stream_api_host = localhost
stream_api_port = 8081
recommendation_api_host = localhost
recommendation_api_port = 8082
api_timeout_sec = 60

[db]
db_host = localhost
db_port = 5432
db_driver = postgres
db_name = ms_db
db_user = ms_user
db_password = ms_password
db_ssl_mode = disable

[file]
dir_path = assets/media
upload_dir_path = assets/upload
video_filename = video.mp4
thumbnail_filename = thumbnail.jpg
convert_video_script_file_path = scripts/convert_video.sh
convert_video_resolution = 1920x1080