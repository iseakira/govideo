services:
  postgresql:
    image: postgres:18-alpine
    container_name: postgresql
    environment:
      POSTGRES_DB: ms_db
      POSTGRES_USER: ms_user
      POSTGRES_PASSWORD: ms_password
    ports:
      - 5432:5432
    volumes:
      - postgresql-data:/var/lib/postgresql/data
      - ./external-apps/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ms_user -d ms_db']
      interval: 5s
      timeout: 5s
      retries: 10
    hostname: postgresql
    restart: unless-stopped
    user: root
  ms-recommendation-api:
    build: .
    image: ms-recommendation-api:local
    container_name: ms-recommendation-api
    environment:
      APP_ENV: development
    ports:
      - 8082:8082
    volumes:
      - service-logs:/app/logs
    depends_on:
      postgresql:
        condition: service_healthy
    hostname: ms-recommendation-api
    restart: unless-stopped
    user: root

volumes:
  postgresql-data:
  service-logs:
